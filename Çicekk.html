<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Senin İçin Hümoşumm💜</title>
<style>
  /* Şık el yazısı tipini Google Fonts'tan çekiyoruz */
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap');

  body {
    margin: 0;
    height: 100vh;
    /* Arka planı daha derin ve gizemli bir gece mavisi-siyah degrade yapalım */
    background: radial-gradient(circle at center, #1a0033 0%, #000 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: white;
  }

  .container {
    position: relative;
    width: 100%;
    height: 70vh; /* Çiçek için alan */
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg {
    width: 100%;
    max-width: 400px;
    height: auto;
    overflow: visible;
  }

  /* --- Animasyon Sınıfları --- */

  /* Sap Animasyonu (Çizilme Efekti) */
  .stem {
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: drawStem 2.5s ease-in-out forwards;
  }

  /* Yaprak Animasyonları */
  .leaf {
    transform: scale(0);
    opacity: 0;
    animation: growLeaf 1s ease-out forwards;
  }
  .leaf-1 { animation-delay: 2s; transform-origin: 180px 300px; }
  .leaf-2 { animation-delay: 2.3s; transform-origin: 220px 280px; }

  /* Çiçek Animasyonu (Yavaşça Belirme ve Parlama) */
  .flower-head {
    opacity: 0;
    transform: scale(0.5);
    animation: bloom 2s ease-out 2.5s forwards;
    transform-origin: 200px 150px; /* Çiçeğin merkezi */
  }

  /* Parıltı Animasyonu (Sürekli Hafifçe Yanıp Sönme) */
  .glow-circle {
    fill: #d9a6ff;
    opacity: 0;
    animation: sparkle 3s ease-in-out infinite;
  }

  /* Uçuşan Parçacıklar (Sihirli Toz) */
  .particle {
    fill: white;
    opacity: 0;
    animation: particleFly 4s infinite linear;
  }

  /* --- Keyframes (Animasyon Tanımları) --- */

  @keyframes drawStem {
    to { stroke-dashoffset: 0; }
  }

  @keyframes growLeaf {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes bloom {
    0% { opacity: 0; transform: scale(0.5) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); filter: drop-shadow(0 0 15px #b388ff); }
  }

  @keyframes sparkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  @keyframes particleFly {
    0% { transform: translateY(0) translateX(0) scale(0.5); opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(-100px) translateX(20px) scale(1); opacity: 0; }
  }

  @keyframes fadeInText {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- Yazı Stilleri --- */
  .text-container {
    margin-top: -50px; /* Çiçeğe yaklaştıralım */
    text-align: center;
    z-index: 10;
  }

  .text-line {
    font-family: 'Dancing Script', cursive;
    font-size: 2.2rem;
    margin: 0;
    opacity: 0;
    animation: fadeInText 2s ease-out 4s forwards; /* Çiçekten sonra gelsin */
    text-shadow: 0 0 10px rgba(217, 166, 255, 0.5);
  }

  .text-highlight {
    color: #b388ff; /* Kod kelimesini vurgulayalım */
    font-weight: bold;
  }

</style>
</head>
<body>

<div class="container">
  <svg class="particles" viewBox="0 0 400 500" style="position: absolute; width: 100%; height: 100%; pointer-events: none;">
    <circle class="particle" cx="150" cy="200" r="2" style="animation-delay: 3s;"></circle>
    <circle class="particle" cx="250" cy="150" r="1.5" style="animation-delay: 3.5s;"></circle>
    <circle class="particle" cx="200" cy="100" r="2" style="animation-delay: 4s;"></circle>
    <circle class="particle" cx="180" cy="250" r="1" style="animation-delay: 4.5s;"></circle>
    <circle class="particle" cx="220" cy="220" r="2.5" style="animation-delay: 5s;"></circle>
  </svg>

  <svg viewBox="0 0 400 500">
    <defs>
      <linearGradient id="stemGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#a25aff" />
        <stop offset="100%" stop-color="#673ab7" />
      </linearGradient>
      <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#b388ff" />
        <stop offset="100%" stop-color="#4a148c" stop-opacity="0.8"/>
      </linearGradient>
      <radialGradient id="flowerGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="#fff" />
        <stop offset="50%" stop-color="#d9a6ff" />
        <stop offset="100%" stop-color="#a25aff" />
      </radialGradient>
    </defs>

    <path class="stem" d="M200,450 C200,350 180,250 200,150" fill="none" stroke="url(#stemGradient)" stroke-width="5" stroke-linecap="round"/>

    <g class="leaf leaf-1">
      <path d="M196,300 C150,300 130,260 140,230 C160,230 180,260 196,300" fill="url(#leafGradient)" />
    </g>
    <g class="leaf leaf-2">
      <path d="M204,280 C240,290 270,250 260,210 C240,210 210,250 204,280" fill="url(#leafGradient)" />
    </g>

    <g class="flower-head">
      <path d="M200,150 C120,130 110,30 200,50 C290,30 280,130 200,150 Z" fill="#673ab7" opacity="0.8"/>
      <path d="M200,150 C140,140 130,60 200,80 C270,60 260,140 200,150 Z" fill="#673ab7" opacity="0.9"/>
      
      <path d="M200,150 C160,140 150,80 200,100 C250,80 240,140 200,150 Z" fill="url(#flowerGradient)"/>
      <path d="M200,150 C175,145 170,100 200,115 C230,100 225,145 200,150 Z" fill="#e1bee7"/>

      <circle cx="200" cy="115" r="15" fill="#fff" filter="blur(5px)" opacity="0.6"/>
    </g>

    <g class="glow-head">
      <circle class="glow-circle" cx="170" cy="80" r="3" style="animation-delay: 3s;"></circle>
      <circle class="glow-circle" cx="230" cy="70" r="2.5" style="animation-delay: 3.5s;"></circle>
      <circle class="glow-circle" cx="200" cy="40" r="3" style="animation-delay: 4s;"></circle>
      <circle class="glow-circle" cx="140" cy="120" r="2" style="animation-delay: 4.5s;"></circle>
    </g>
  </svg>
</div>

<div class="text-container">
  <p class="text-line">Herkes çiçek alır...</p>
  <p class="text-line" style="animation-delay: 5s;">Bense senin için <span class="text-highlight">kodladım Hümeyramm</span>. 💜</p>
</div>

</body>
</html>
